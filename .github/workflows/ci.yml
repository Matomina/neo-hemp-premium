name: CI — Culture Bio Diamant

on:
  push:
    branches: [main, 'release/**', 'test/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Frontend ───────────────────────────────────────────
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests with coverage
        run: npm run test:coverage
        env:
          VITE_API_URL: ''

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ''

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 7

  # ─── Backend ────────────────────────────────────────────
  backend:
    name: Backend (check + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      JWT_SECRET: test-secret-for-ci-with-minimum-length-of-32-chars
      ADMIN_EMAIL: admin@test.local
      ADMIN_PASS_HASH: $2b$12$testhashtesthasttesthasttesthasttesthasttesthasttesthas
      FRONTEND_ORIGINS: http://localhost:5173,http://localhost:4173
      STRIPE_ENABLED: 'false'
      SMTP_HOST: ''
      SMTP_USER: ''
      SMTP_PASS: ''
      SMTP_FROM: Culture Bio Diamant Test <test@example.com>
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_culture_bio

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_culture_bio
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Run migrations (test DB)
        run: npx prisma migrate deploy
        continue-on-error: false

      - name: TypeScript check
        run: npm run check

      - name: Tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ─── Prisma validate (rapide, sans DB) ──────────────────
  prisma:
    name: Prisma schema
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --include=dev
      - run: npx prisma generate
      - run: npx prisma validate
