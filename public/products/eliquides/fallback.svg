<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <radialGradient id="glow-e" cx="50%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#72f7ff" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="eliq-bottle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a4a"/>
      <stop offset="100%" stop-color="#0a1e28"/>
    </linearGradient>
    <linearGradient id="eliq-label" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect width="500" height="350" fill="#020208"/>
  <ellipse cx="250" cy="175" rx="160" ry="130" fill="url(#glow-e)"/>

  <!-- E-liquid bottle (10ml flat bottle) -->
  <g transform="translate(250,182)">
    <!-- Child-proof cap -->
    <rect x="-14" y="-110" width="28" height="20" rx="8" fill="#1a3a4a" opacity="0.9"/>
    <!-- Cap ridges detail -->
    <line x1="-10" y1="-108" x2="-10" y2="-93" stroke="#72f7ff" stroke-width="0.7" opacity="0.3"/>
    <line x1="-5" y1="-108" x2="-5" y2="-93" stroke="#72f7ff" stroke-width="0.7" opacity="0.3"/>
    <line x1="0" y1="-108" x2="0" y2="-93" stroke="#72f7ff" stroke-width="0.7" opacity="0.3"/>
    <line x1="5" y1="-108" x2="5" y2="-93" stroke="#72f7ff" stroke-width="0.7" opacity="0.3"/>
    <line x1="10" y1="-108" x2="10" y2="-93" stroke="#72f7ff" stroke-width="0.7" opacity="0.3"/>
    <!-- Nozzle tip -->
    <rect x="-3" y="-90" width="6" height="12" rx="3" fill="#72f7ff" opacity="0.55"/>
    <!-- Neck -->
    <rect x="-14" y="-78" width="28" height="15" rx="3" fill="url(#eliq-bottle)"/>
    <!-- Bottle body — slightly rounded rectangle -->
    <rect x="-30" y="-63" width="60" height="110" rx="8" fill="url(#eliq-bottle)" opacity="0.95"/>
    <!-- Bottle shine left -->
    <rect x="-28" y="-60" width="8" height="104" rx="4" fill="rgba(255,255,255,0.07)"/>
    <!-- Label area -->
    <rect x="-26" y="-45" width="52" height="65" rx="5" fill="url(#eliq-label)"/>
    <!-- Label content -->
    <text x="0" y="-24" text-anchor="middle" fill="rgba(114,247,255,0.85)"
          font-family="Georgia,serif" font-size="7" letter-spacing="2" font-weight="bold">CBD</text>
    <text x="0" y="-12" text-anchor="middle" fill="rgba(255,255,255,0.55)"
          font-family="sans-serif" font-size="5" letter-spacing="1">E-LIQUIDE</text>
    <!-- Concentration pill -->
    <rect x="-14" y="-4" width="28" height="10" rx="5" fill="rgba(114,247,255,0.22)"/>
    <text x="0" y="4" text-anchor="middle" fill="rgba(114,247,255,0.9)"
          font-family="sans-serif" font-size="5.5" font-weight="bold" letter-spacing="0.5">300 mg</text>
    <!-- Bottom label -->
    <text x="0" y="20" text-anchor="middle" fill="rgba(255,255,255,0.30)"
          font-family="sans-serif" font-size="4" letter-spacing="0.5">Sans nicotine</text>
    <!-- Bottle base -->
    <rect x="-30" y="47" width="60" height="8" rx="4" fill="#0a1e28"/>
  </g>

  <!-- Vapor cloud dots -->
  <circle cx="298" cy="98" r="7" fill="#72f7ff" opacity="0.12"/>
  <circle cx="310" cy="88" r="5" fill="#72f7ff" opacity="0.09"/>
  <circle cx="303" cy="80" r="4" fill="#72f7ff" opacity="0.07"/>

  <text x="250" y="325" text-anchor="middle"
        fill="rgba(255,255,255,0.28)" font-family="Georgia,serif"
        font-size="10" letter-spacing="4">E-LIQUIDES CBD</text>

  <polygon points="250,302 256,308 250,314 244,308"
           fill="none" stroke="#72f7ff" stroke-width="0.8" opacity="0.35"/>
</svg>
