      <stop offset="100%" stop-color="#050608" />
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2ab" />
      <stop offset="100%" stop-color="#f2d34f" />
