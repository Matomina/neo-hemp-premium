<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <radialGradient id="glow-r" cx="50%" cy="52%" r="44%">
      <stop offset="0%" stop-color="#b48cff" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rock-r" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4a23a"/>
      <stop offset="40%" stop-color="#9a7b2a"/>
      <stop offset="100%" stop-color="#5a4010"/>
    </linearGradient>
    <linearGradient id="rock-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c84a"/>
      <stop offset="100%" stop-color="#c4a23a"/>
    </linearGradient>
  </defs>

  <rect width="500" height="350" fill="#020208"/>
  <ellipse cx="250" cy="185" rx="175" ry="140" fill="url(#glow-r)"/>

  <!-- Resin rock / crystal cluster -->
  <g transform="translate(250,190)">
    <!-- Main rock body -->
    <polygon points="-55,40 -70,10 -45,-30 -10,-55 30,-50 65,-25 70,15 50,42 -20,48"
             fill="url(#rock-r)" opacity="0.88"/>
    <!-- Rock top face (lighter) -->
    <polygon points="-45,-30 -10,-55 30,-50 20,-20 -15,-18"
             fill="url(#rock-top)" opacity="0.72"/>
    <!-- Crystal facet left -->
    <polygon points="-55,40 -70,10 -45,-30 -15,-18"
             fill="#7c5c1a" opacity="0.65"/>
    <!-- Crystal highlight -->
    <polygon points="-10,-55 30,-50 20,-20 -5,-25"
             fill="#f0d870" opacity="0.35"/>
    <!-- Small crystal top right -->
    <polygon points="42,-12 58,-32 72,-8 58,5"
             fill="#c4a23a" opacity="0.70"/>
    <polygon points="42,-12 58,-32 52,-22"
             fill="#e8c84a" opacity="0.55"/>
    <!-- Glow particle dots -->
    <circle cx="-20" cy="-35" r="2.5" fill="#b48cff" opacity="0.55"/>
    <circle cx="35" cy="-40" r="2" fill="#ffe4a0" opacity="0.65"/>
    <circle cx="-48" cy="0" r="1.8" fill="#b48cff" opacity="0.40"/>
  </g>

  <!-- Orbit ring -->
  <ellipse cx="250" cy="185" rx="100" ry="60" fill="none"
           stroke="#b48cff" stroke-width="0.5" opacity="0.20" transform="rotate(-15,250,185)"/>

  <text x="250" y="325" text-anchor="middle"
        fill="rgba(255,255,255,0.28)" font-family="Georgia,serif"
        font-size="10" letter-spacing="5">RÉSINES CBD</text>

  <polygon points="250,302 256,308 250,314 244,308"
           fill="none" stroke="#b48cff" stroke-width="0.8" opacity="0.35"/>
</svg>
