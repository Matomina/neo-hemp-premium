<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <radialGradient id="glow-c" cx="50%" cy="52%" r="44%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#7c3aed" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-c2" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffe4a0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffe4a0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="jar-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2040"/>
      <stop offset="100%" stop-color="#120e22"/>
    </linearGradient>
    <linearGradient id="jar-lid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="jar-shine" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <rect width="500" height="350" fill="#020208"/>
  <ellipse cx="250" cy="178" rx="175" ry="138" fill="url(#glow-c)"/>
  <ellipse cx="250" cy="178" rx="120" ry="90" fill="url(#glow-c2)"/>

  <!-- Cosmetic jar -->
  <g transform="translate(250,188)">
    <!-- Jar lid -->
    <ellipse cx="0" cy="-72" rx="52" ry="14" fill="url(#jar-lid)" opacity="0.95"/>
    <!-- Lid side -->
    <path d="M-52,-72 L-52,-58 Q-52,-50 -44,-50 L44,-50 Q52,-50 52,-58 L52,-72Z"
          fill="#6d28d9" opacity="0.9"/>
    <!-- Lid shine -->
    <ellipse cx="-15" cy="-76" rx="18" ry="5" fill="rgba(255,255,255,0.20)"/>
    <!-- Lid label circle -->
    <circle cx="0" cy="-72" r="22" fill="rgba(255,255,255,0.06)" stroke="#c084fc" stroke-width="0.6" opacity="0.5"/>
    <!-- CBD text on lid -->
    <text x="0" y="-68" text-anchor="middle" fill="rgba(255,255,255,0.65)"
          font-family="Georgia,serif" font-size="7" letter-spacing="2" font-weight="bold">CBD</text>

    <!-- Jar body -->
    <path d="M-55,-50 L-58,50 Q-58,65 -44,65 L44,65 Q58,65 58,50 L55,-50Z"
          fill="url(#jar-body)" opacity="0.96"/>
    <!-- Jar shine left panel -->
    <path d="M-55,-50 L-58,50 Q-58,65 -44,65 L-28,65 L-25,-50Z"
          fill="url(#jar-shine)"/>
    <!-- Body label band -->
    <rect x="-50" y="-28" width="100" height="55" rx="4" fill="rgba(192,132,252,0.08)"/>
    <!-- Label text -->
    <text x="0" y="-8" text-anchor="middle" fill="rgba(192,132,252,0.70)"
          font-family="Georgia,serif" font-size="8" letter-spacing="1" font-weight="bold">DIAMOND</text>
    <text x="0" y="5" text-anchor="middle" fill="rgba(255,255,255,0.45)"
          font-family="sans-serif" font-size="5" letter-spacing="2">COSMÉTIQUE CBD</text>
    <text x="0" y="18" text-anchor="middle" fill="rgba(255,228,160,0.50)"
          font-family="sans-serif" font-size="4.5" letter-spacing="1">USAGE EXTERNE</text>

    <!-- Jar base shadow -->
    <ellipse cx="0" cy="65" rx="56" ry="8" fill="rgba(0,0,0,0.5)"/>
  </g>

  <!-- Sparkle accents -->
  <g opacity="0.45">
    <line x1="188" y1="130" x2="188" y2="140" stroke="#c084fc" stroke-width="1"/>
    <line x1="183" y1="135" x2="193" y2="135" stroke="#c084fc" stroke-width="1"/>
    <line x1="310" y1="118" x2="310" y2="128" stroke="#ffe4a0" stroke-width="1"/>
    <line x1="305" y1="123" x2="315" y2="123" stroke="#ffe4a0" stroke-width="1"/>
  </g>

  <text x="250" y="325" text-anchor="middle"
        fill="rgba(255,255,255,0.28)" font-family="Georgia,serif"
        font-size="10" letter-spacing="3">COSMÉTIQUES CBD</text>

  <polygon points="250,302 256,308 250,314 244,308"
           fill="none" stroke="#c084fc" stroke-width="0.8" opacity="0.35"/>
</svg>
