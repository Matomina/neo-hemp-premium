<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-label="Bocal Conservation Verre">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2321" />
      <stop offset="58%" stop-color="#0d1016" />
      <stop offset="100%" stop-color="#050608" />
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#defcee" />
      <stop offset="100%" stop-color="#7ee4b5" />
    </linearGradient>
    <filter id="blur-xl" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="70" />
    </filter>
    <filter id="blur-md" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#000000" flood-opacity="0.42" />
    </filter>
  </defs>
  
  <rect width="800" height="800" fill="#090b10" />
  <rect width="800" height="800" fill="url(#bg)" />
  <ellipse cx="400" cy="180" rx="280" ry="100" fill="#68d8ff" opacity="0.16" filter="url(#blur-xl)" />
  <ellipse cx="400" cy="690" rx="290" ry="70" fill="#000000" opacity="0.68" filter="url(#blur-md)" />
  <rect x="44" y="44" width="712" height="712" rx="44" fill="none" stroke="rgba(255,255,255,0.08)" />

  
    <g filter="url(#shadow)">
      <rect x="272" y="338" width="256" height="244" rx="38" fill="#1c2321" />
      <rect x="304" y="370" width="192" height="180" rx="26" fill="#7ee4b5" opacity="0.16" />
    </g>
  
</svg>
